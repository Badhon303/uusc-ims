<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body,
      h1,
      h2,
      h3,
      h4,
      p,
      em,
      strong {
        font-family: sans-serif;
      }

      body {
        font-size: 15px;
        color: #333333;
      }

      a {
        color: #333333;
        outline: 0;
        text-decoration: underline;
      }

      img {
        max-width: 100%;
        height: auto;
        vertical-align: top;
        border: 0;
        outline: 0;
      }

      h1 {
        font-size: 40px;
        color: #333333;
        margin: 0 0 30px 0;
        font-weight: 900;
        line-height: 1.25;
      }

      table {
        border-collapse: collapse;
      }

      p,
      td {
        font-size: 14px;
        line-height: 25px;
        color: #333333;
      }

      .main {
        background: white;
      }

      .max-width {
        max-width: 800px;
        width: 94%;
        margin: 0 3%;
      }

      .padding {
        padding: 60px;
      }

      .spacer {
        line-height: 45px;
        height: 45px;
      }

      @media screen and (max-width: 800px) {
        h1 {
          font-size: 24px !important;
        }
        .max-width {
          width: 90% !important;
          margin: 0 5% !important;
        }
        td.padding {
          padding: 30px !important;
        }
        .spacer {
          line-height: 20px !important;
          height: 20px !important;
        }
      }
    </style>
  </head>

  <body>
    <div style="background-color: #f3f3f3; min-height: 100%">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f3f3f3">
        <tr>
          <td valign="top" align="center">
            <table class="max-width" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td class="spacer">&nbsp;</td>
              </tr>
              <tr>
                <td class="padding main">
                  <table cellpadding="0" cellspacing="0" border="0" width="100%">
                    <tr>
                      <td>
                        <a href="#" target="_blank">
                          <img
                            src="https://res.cloudinary.com/dkgnbqyws/image/upload/v1773763312/uusc_e87ybk.webp"
                            width="150"
                            alt="Logo"
                          />
                        </a>
                      </td>
                    </tr>
                    <tr>
                      <td class="spacer">&nbsp;</td>
                    </tr>
                    <tr>
                      <td>
                        <h1>Reset Password</h1>
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <p>
                          You are receiving this email because you requested to reset your password.
                          Click the button below to reset your password.
                        </p>

                        <div style="margin-top: 30px">
                          <a
                            href="{{RESET_URL}}"
                            style="
                              background-color: #222222;
                              border-radius: 4px;
                              color: #ffffff;
                              display: inline-block;
                              font-family: sans-serif;
                              font-size: 13px;
                              font-weight: bold;
                              line-height: 60px;
                              text-align: center;
                              text-decoration: none;
                              width: 200px;
                              -webkit-text-size-adjust: none;
                            "
                          >
                            RESET PASSWORD
                          </a>
                        </div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td class="spacer">&nbsp;</td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
